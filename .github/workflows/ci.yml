name: CI

# Urban Renewal OS — 五道 Gate：Gate0–Gate4（M1 Task 1）。任一 Gate 紅即擋 merge。
# 註：PDF 原列四道（Gate1–4），本 CI 另加 Gate0 資料紀律紅線＝共五道；Gate1 含 pytest 與
#     min_example 兩條指令（同屬「Python」一道），故 5 道 Gate ＝ 6 條驗證指令。
# 設計依據：docs/architecture/MIGRATION_PLAN.md 步驟3、FREEZE_REVIEW-2026-07.md（CI 從零建立）。
# 所有步驟都從 repo 根目錄執行。

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── M2-B：套件可安裝性（pyproject）——裝完後從非 repo 目錄 import 必須成功 ──
      # 註：apps/streamlit/app.py 保留 sys.path 墊片（Streamlit Cloud 只裝 requirements.txt，
      #     不會 pip install -e .；墊片是該環境的零風險路徑，兩者並存、互不干擾）。
      - name: "Gate 1.5 — Package installability (pip install -e .)"
        run: |
          pip install -e .
          cd /tmp && python -c "import core.redcf as r; print('installed import OK', r.CORE_VERSION)"

      # ── Gate 0：資料紀律（紅線）——真實案件段名零命中 ──────────────
      - name: "Gate 0 — No real names"
        run: bash check_no_real_names.sh

      # ── Gate 1：Python（pytest 黃金＋合約＋headless、schema 驗證、min_example）──
      - name: "Gate 1 — pytest (golden + contract + headless + schema)"
        run: python -m pytest -q
      - name: "Gate 1 — min_example smoke"
        run: python min_example.py

      # ── Gate 2：Core 零 UI 依賴（封鎖 streamlit/plotly 後仍能 import + 計算）──
      - name: "Gate 2 — Core import isolation"
        run: python tools/check_core_isolation.py

      # ── Gate 3：Excel 範本迴歸（內容比對，非 raw bytes；防範本被誤改）──
      - name: "Gate 3 — Template regression"
        run: python tools/check_template.py

      # ── Gate 4：靜態站本地連結（apps/web 死連結/404 即 Fail）──────────
      - name: "Gate 4 — Static web links"
        run: python tools/check_web_links.py

      # ── Gate 5：URBAN STRAND 遊戲核心 headless（機制＋可贏性 8–24 週）──
      - name: "Gate 5 — Simulator headless (node)"
        run: node tests/web/test_os_simulator.mjs
